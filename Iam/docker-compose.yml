version: '3.8'

services:
  # --- ANNUAIRE CENTRAL : OPENLDAP ---
  openldap:
    image: osixia/openldap:latest
    container_name: openldap_securebox
    environment:
      - LDAP_ORGANISATION=Acme Corp
      - LDAP_DOMAIN=acme.corp
      - LDAP_ADMIN_PASSWORD=adminpassword
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d

  # --- INTERFACE DE GESTION : PHPLDAPADMIN ---
  phpldapadmin:
    image: osixia/phpldapadmin:latest
    container_name: phpldapadmin_securebox
    environment:
      - PHPLDAPADMIN_LDAP_HOSTS=openldap
      - PHPLDAPADMIN_HTTPS=false
services:
  # --- ANNUAIRE CENTRAL : OPENLDAP ---
  openldap:
    image: osixia/openldap:latest
    container_name: openldap_securebox
    environment:
      - LDAP_ORGANISATION=Acme Corp
      - LDAP_DOMAIN=acme.corp
      - LDAP_ADMIN_PASSWORD=adminpassword
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d

  # --- INTERFACE DE GESTION : PHPLDAPADMIN ---
  phpldapadmin:
    image: osixia/phpldapadmin:latest
    container_name: phpldapadmin_securebox
    environment:
      - PHPLDAPADMIN_LDAP_HOSTS=openldap
      - PHPLDAPADMIN_HTTPS=false
    ports:
      - "8080:80"
    depends_on:
            - openldap

  # --- BASE DE DONNÉES POUR KEYCLOAK ---
  postgres:
    image: postgres:15
    container_name: postgres_securebox
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=keycloakpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- GESTIONNAIRE D'IDENTITÉ (SSO) : KEYCLOAK ---
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak_securebox
    command: start-dev
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=adminpassword
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloakpassword
    ports:
       - "8180:8080"
    depends_on:
      - postgres
      - openldap
# (Ici se termine ton bloc keycloak...)

  # --- SERVER DE STOCKAGE DES LOGS ---
  loki:
    image: grafana/loki:latest
    container_name: loki_securebox
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  # --- COLLECTEUR DE LOGS ---
  promtail:
    image: grafana/promtail:latest
    container_name: promtail_securebox
    volumes:
      - /OpenSource/iam/config/promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/log/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  # --- INTERFACE DE VISUALISATION ---
  grafana:
    image: grafana/grafana:latest
    container_name: grafana_securebox
    ports:
      - "3000:3000"
    environment:
      - GF_SERVER_ROOT_URL=http://10.107.187.130:3000
      - GF_SECURITY_ADMIN_PASSWORD=adminpassword
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=Keycloak
      - GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP=true
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=grafana
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid profile email
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=http://10.107.187.130:8180/realms/acme/protocol/openid-connect/auth
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=http://10.107.187.130:8180/realms/acme/protocol/openid-connect/token
      - GF_AUTH_GENERIC_OAUTH_API_URL=http://10.107.187.130:8180/realms/acme/protocol/openid-connect/userinfo
    depends_on:
      - loki

# --- TOUT À LA FIN DU FICHIER (COLLÉ À GAUCHE) ---
volumes:
  ldap_data:
    name: iam_ldap_data
  ldap_config:
    name: iam_ldap_config
  postgres_data:

